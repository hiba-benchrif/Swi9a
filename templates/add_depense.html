{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2>Add Personal Expense</h2>
    
    {% if success_msg %}
    <div class="alert alert-success">{{ success_msg }}</div>
    {% endif %}
    
    {% if ai_message %}
    <div class="alert alert-info" style="font-weight: 500;">
        💡 <b>AI Analysis:</b> {{ ai_message }}
    </div>
    {% endif %}

    <form method="post" action="/add-depense">
        <div class="form-group">
            <label for="amount">Amount (MAD)</label>
            <input type="number" id="amount" name="amount" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Housing">Housing</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <button type="submit" class="btn btn-block">Add Expense</button>
    </form>
    <p style="margin-top: 1rem; text-align: center;"><a href="/dashboard">Back to Dashboard</a></p>
</div>
{% endblock %}
