{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2>Add Public Price</h2>
    <p style="margin-bottom: 1.5rem;">Share a price you found with the community.</p>
    <form method="post" action="/add-prix">
        <div class="form-group">
            <label for="product">Product Name</label>
            <input type="text" id="product" name="product" required placeholder="e.g. Tomatoes 1kg">
        </div>
        <div class="form-group">
            <label for="price">Price (MAD)</label>
            <input type="number" id="price" name="price" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required>
        </div>
        <button type="submit" class="btn btn-block">Add Price</button>
    </form>
</div>
{% endblock %}
